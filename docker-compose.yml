services:

  backend:
    build: ./backend

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app

    depends_on:
      - redis

  redis:
    image: redis:alpine

    ports:
      - "6379:6379"

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    env_file:
      - .env

    
    depends_on:
      - backend